<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">

        <h1>Student Performance Predictor</h1>

        <input type="number" id="study_hours" placeholder="Study Hours">

        <input type="number" id="attendance" placeholder="Attendance %">

        <input type="number" id="sleep_hours" placeholder="Sleep Hours">

        <input type="number" id="previous_score" placeholder="Previous Score">

        <button onclick="predict()">Predict</button>

        <div id="result"></div>

    </div>

    <script>

        async function predict() {

            const study_hours =
                document.getElementById("study_hours").value;

            const attendance =
                document.getElementById("attendance").value;

            const sleep_hours =
                document.getElementById("sleep_hours").value;

            const previous_score =
                document.getElementById("previous_score").value;

            const response = await fetch("/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    study_hours: Number(study_hours),
                    attendance: Number(attendance),
                    sleep_hours: Number(sleep_hours),
                    previous_score: Number(previous_score)
                })
            });

            const data = await response.json();

            document.getElementById("result").innerHTML = `
                <h2>Prediction: ${data.prediction}</h2>
                <h3>Pass Probability: ${data.pass_probability}</h3>
            `;
        }

    </script>

</body>
</html>
